<h2 style="color: var(--primary); margin-top: 0;">📩 Envíame un mensaje</h2>
<p>Si tienes alguna duda sobre el proyecto con Firebase, rellena este formulario.</p>

<form style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
    <div>
        <label style="display: block; margin-bottom: 5px; font-weight: 600;">Nombre:</label>
        <input type="text" placeholder="Tu nombre" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
    </div>

    <div>
        <label style="display: block; margin-bottom: 5px; font-weight: 600;">Email:</label>
        <input type="email" placeholder="correo@ejemplo.com" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
    </div>

    <div>
        <label style="display: block; margin-bottom: 5px; font-weight: 600;">Mensaje:</label>
        <textarea rows="4" placeholder="¿En qué puedo ayudarte?" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; resize: vertical;"></textarea>
    </div>

    <button type="button" onclick="alert('¡Mensaje enviado! (Aquí podrías conectar con Firebase Database luego)')" 
        style="background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: opacity 0.3s;">
        Enviar Mensaje
    </button>
</form>
